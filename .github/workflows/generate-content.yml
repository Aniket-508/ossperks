name: Generate and Translate

on:
  pull_request:
    paths:
      - "packages/core/src/programs/*.json"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.29.1"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22.20.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate core programs barrel file
        run: pnpm --filter @ossperks/core generate

      - name: Generate English MDX files
        run: pnpm --filter docs generate:programs

      - name: Generate README
        run: pnpm generate:readme

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate content from program data"

      - name: Translate
        uses: lingodotdev/lingo.dev@main
        with:
          working-directory: docs
